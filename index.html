<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News by James | Sign In</title>
<style>
  :root {
    --bg: #080b10;
    --card: rgba(14, 19, 27, 0.92);
    --accent: #1f6feb;
    --accent2: #d4a017;
    --text: #f3f6fb;
    --muted: #8b96a7;
    --error: #e11d48;
    --line: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background:
      radial-gradient(circle at top, rgba(31,111,235,0.16), transparent 32%),
      linear-gradient(180deg, #0b1017 0%, #07090d 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 430px;
    width: 100%;
  }
  .brand-kicker {
    color: var(--accent2);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .brand-title {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    margin-bottom: 6px;
  }
  .brand-sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 18px;
  }
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    border: 1px solid var(--line);
    backdrop-filter: blur(10px);
  }
  .tabs {
    display: flex;
    background: #0d141d;
    padding: 6px;
    border-radius: 12px;
    margin-bottom: 28px;
    border: 1px solid var(--line);
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }
  .tab.active {
    background: linear-gradient(135deg, var(--accent), #134ea8);
    color: white;
    box-shadow: 0 10px 24px rgba(31,111,235,0.28);
  }
  .error-box {
    background: rgba(225, 29, 72, 0.1);
    border: 1px solid var(--error);
    color: #fda4af;
    padding: 12px;
    border-radius: 10px;
    font-size: 0.85rem;
    margin-bottom: 20px;
    text-align: center;
    display: none;
  }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  input {
    width: 100%;
    background: #0c1219;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    color: white;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(31,111,235,0.16);
  }
  .btn {
    width: 100%;
    background: linear-gradient(135deg, #1f6feb, #143f7a);
    color: white;
    border: 1px solid rgba(255,255,255,0.06);
    padding: 16px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
    margin-top: 10px;
    box-shadow: 0 14px 28px rgba(10, 22, 46, 0.35);
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .loading { opacity: 0.7; pointer-events: none; }
</style>
</head>
<body>

<div class="container">
  <div class="brand-kicker">Daily Pulse</div>
  <div class="brand-title">News by James</div>
  <div class="brand-sub">Sports. Rap. Headlines that actually matter today.</div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-signin" onclick="setMode('signin')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="setMode('signup')">Create Account</div>
    </div>

    <div style="text-align:center;color:#999;font-size:11px;margin:-6px 0 14px;">build 2026-03-24-0548</div>

    <div class="error-box" id="error-box">Failed to sign in. Please try again.</div>

    <form id="auth-form" onsubmit="handleSubmit(event)">
      <div class="field">
        <label>Handle</label>
        <input type="text" id="handle" placeholder="james" required spellcheck="false" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="signup-fields" style="display:none;">
        <div class="field">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your name" autocomplete="name">
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="4045551212" autocomplete="tel">
        </div>
        <div class="field">
          <label>Birthday</label>
          <input type="date" id="birthday" autocomplete="bday">
        </div>
      </div>
      <button type="submit" class="btn" id="submit-btn">Sign In</button>
    </form>
  </div>
</div>

<script>
const API_URL = '/.netlify/functions/nbj';

async function api(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload })
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

let mode = 'signin';

function setMode(newMode) {
  mode = newMode;
  document.getElementById('tab-signin').classList.toggle('active', mode === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('submit-btn').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('signup-fields').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('password').setAttribute('autocomplete', mode === 'signin' ? 'current-password' : 'new-password');
  document.getElementById('error-box').style.display = 'none';
}

async function handleSubmit(e) {
  e.preventDefault();
  const handle = document.getElementById('handle').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');
  const errorBox = document.getElementById('error-box');
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const birthday = document.getElementById('birthday').value;

  errorBox.style.display = 'none';
  btn.classList.add('loading');
  btn.textContent = mode === 'signin' ? 'Signing in...' : 'Creating account...';

  try {
    const searchHandle = handle.startsWith('@') ? handle : '@' + handle;

    if (mode === 'signin') {
      const result = await api('signin', { handle: searchHandle, password });
      localStorage.setItem('nbj_user', JSON.stringify(result.user));
      window.location.href = '/rapper-tool/';
    } else {
      const result = await api('signup', { handle: searchHandle, password, name, phone, birthday });
      localStorage.setItem('nbj_user', JSON.stringify({
        id: result.user.id,
        handle: result.user.handle,
        name: result.user.name
      }));
      window.location.href = '/rapper-tool/';
    }
  } catch (err) {
    console.error(err);
    errorBox.textContent = mode === 'signin' ? 'Failed to sign in. Please try again.' : (err.message || 'Error creating account.');
    errorBox.style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    btn.textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
  }
}

// Redirect if already logged in
if (localStorage.getItem('nbj_user')) {
  window.location.href = '/rapper-tool/';
}
</script>

</body>
</html>
